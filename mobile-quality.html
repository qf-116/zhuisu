<!DOCTYPE html>
<html lang="zh-CN">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width,initial-scale=1.0,maximum-scale=1.0,user-scalable=no">
<title>质检记录</title>
<link rel="stylesheet" href="mobile-common.css">
<style>
.qc-list{padding:0 16px}
.qc-item{background:#fff;border-radius:10px;margin-bottom:8px;border:1px solid #f0f0f0;overflow:hidden;cursor:pointer;transition:background .12s}
.qc-item:active{background:#fafafa}
.qci-row{display:flex;align-items:center;justify-content:space-between;padding:12px 14px}
.qci-row+.qci-row{border-top:1px solid #f7f7f7}
.qci-no{font-size:14px;font-weight:600;color:#1d2129}
.qci-result{padding:3px 8px;border-radius:4px;font-size:11px;font-weight:600}
.qci-result.pass{background:#f6ffed;color:#52c41a;border:1px solid #b7eb8f}
.qci-result.fail{background:#fff1f0;color:#ff4d4f;border:1px solid #ffa39e}
.qci-meta{display:flex;gap:16px;font-size:12px;color:#86909c;padding:0 14px 12px}
.qci-meta span{white-space:nowrap}
.qci-meta .num{color:#1d2129;font-weight:500}
.qci-meta .pass-num{color:#52c41a;font-weight:500}
.qci-meta .fail-num{color:#ff4d4f;font-weight:500}
</style>
</head>
<body>
<div class="phone-frame">
  <div class="status-bar"><span class="time">9:41</span><span>📶 🔋</span></div>
  <div class="nav-bar">
    <div class="back" onclick="location.href='mobile-overview.html'"><svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><path d="M15 18l-6-6 6-6"/></svg></div>
    <div class="title">质检记录</div>
    <div class="action"></div>
  </div>

  <!-- 统计概览 -->
  <div style="display:flex;gap:10px;padding:16px">
    <div style="flex:1;background:#fff;border-radius:10px;padding:12px;text-align:center;border:1px solid #f0f0f0">
      <div style="font-size:20px;font-weight:700;color:#1890ff">3</div>
      <div style="font-size:11px;color:#86909c;margin-top:2px">报工质检</div>
    </div>
    <div style="flex:1;background:#fff;border-radius:10px;padding:12px;text-align:center;border:1px solid #f0f0f0">
      <div style="font-size:20px;font-weight:700;color:#52c41a">2</div>
      <div style="font-size:11px;color:#86909c;margin-top:2px">合格</div>
    </div>
    <div style="flex:1;background:#fff;border-radius:10px;padding:12px;text-align:center;border:1px solid #f0f0f0">
      <div style="font-size:20px;font-weight:700;color:#ff4d4f">1</div>
      <div style="font-size:11px;color:#86909c;margin-top:2px">不合格</div>
    </div>
  </div>

  <!-- 筛选标签 -->
  <div style="display:flex;gap:8px;padding:0 16px;margin-bottom:16px;overflow-x:auto">
    <span style="background:#1890ff;color:#fff;border-radius:16px;padding:4px 12px;font-size:12px;white-space:nowrap;border:1px solid #1890ff">全部</span>
    <span style="background:#fff;color:#86909c;border-radius:16px;padding:4px 12px;font-size:12px;white-space:nowrap;border:1px solid #e8e8e8">全检</span>
    <span style="background:#fff;color:#86909c;border-radius:16px;padding:4px 12px;font-size:12px;white-space:nowrap;border:1px solid #e8e8e8">抽检</span>
    <span style="background:#fff;color:#86909c;border-radius:16px;padding:4px 12px;font-size:12px;white-space:nowrap;border:1px solid #e8e8e8">合格</span>
    <span style="background:#fff;color:#86909c;border-radius:16px;padding:4px 12px;font-size:12px;white-space:nowrap;border:1px solid #e8e8e8">不合格</span>
  </div>

  <!-- 检验记录列表 -->
  <div class="qc-list">
    <!-- 记录1: 合格 -->
    <div class="qc-item" onclick="location.href='mobile-qc-detail.html'">
      <div class="qci-row">
        <span class="qci-no">JYBG20260508001</span>
        <span class="qci-result pass">合格</span>
      </div>
      <div class="qci-meta">
        <span>低压产品整机装配</span>
        <span>报工 <span class="num">40</span></span>
        <span>合格 <span class="pass-num">40</span></span>
        <span>不合格 <span class="fail-num">0</span></span>
      </div>
      <div class="qci-row" style="padding-top:0">
        <span style="font-size:12px;color:#86909c">2026-05-08 13:00</span>
        <span style="font-size:12px;color:#1890ff;font-weight:500">查看详情 ›</span>
      </div>
    </div>

    <!-- 记录2: 不合格 -->
    <div class="qc-item" onclick="location.href='mobile-qc-detail.html'">
      <div class="qci-row">
        <span class="qci-no">JYBG20260509001</span>
        <span class="qci-result fail">不合格</span>
      </div>
      <div class="qci-meta">
        <span>整机调试</span>
        <span>报工 <span class="num">40</span></span>
        <span>合格 <span class="pass-num">38</span></span>
        <span>不合格 <span class="fail-num">2</span></span>
      </div>
      <div class="qci-row" style="padding-top:0">
        <span style="font-size:12px;color:#86909c">2026-05-09 07:20</span>
        <span style="font-size:12px;color:#1890ff;font-weight:500">查看详情 ›</span>
      </div>
    </div>

    <!-- 记录3: 合格(抽检) -->
    <div class="qc-item" onclick="location.href='mobile-qc-detail.html'">
      <div class="qci-row">
        <span class="qci-no">JYBG20260509002</span>
        <span class="qci-result pass">合格</span>
      </div>
      <div class="qci-meta">
        <span>整机老化</span>
        <span>报工 <span class="num">30</span></span>
        <span>合格 <span class="pass-num">30</span></span>
        <span>不合格 <span class="fail-num">0</span></span>
      </div>
      <div class="qci-row" style="padding-top:0">
        <span style="font-size:12px;color:#86909c">2026-05-09 16:00</span>
        <span style="font-size:12px;color:#1890ff;font-weight:500">查看详情 ›</span>
      </div>
    </div>
  </div>

  <div class="bottom-safe"></div>
</div>
</body>
</html>
